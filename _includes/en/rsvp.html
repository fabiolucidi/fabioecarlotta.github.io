<section id="rsvp" class="section-std">

    <div class="default-title">
        <h2>{{ t.sections.rsvp }}</h2>
    </div>

    <p class="default-text">
        Let us know if you’ll be there to celebrate with us!
        Please remember to share any dietary requirements and/or allergies.
        <strong>Kindly RSVP by February 20th, 2026</strong> 💛
    </p>

    <div class="form-container">

        <form id="rsvp-form">

            <!-- STEP 1 -->
            <div class="step active" id="step-1">
                <h3 class="step-title">General information</h3>

                <div class="floating-label">
                    <input type="text" id="nome" name="nome" required placeholder=" " />
                    <label>First name*</label>
                </div>

                <div class="floating-label">
                    <input type="text" id="cognome" name="cognome" required placeholder=" " />
                    <label>Last name*</label>
                </div>

                <div class="phone-row">
                    <div class="floating-label">
                        <select id="prefix" name="prefix" required>
                            <option value="" disabled selected hidden></option>
                            <option value="+39">🇮🇹 Italy (+39)</option>
                            <option value="+44">🇬🇧 United Kingdom (+44)</option>
                            <option value="+34">🇪🇸 Spain (+34)</option>
                            <option value="+43">🇦🇹 Austria (+43)</option>
                            <option value="+1">🇺🇸 United States (+1)</option>
                            <option disabled>──────────</option>
                            <option value="+33">🇫🇷 France (+33)</option>
                            <option value="+49">🇩🇪 Germany (+49)</option>
                            <option value="+41">🇨🇭 Switzerland (+41)</option>
                            <option value="+31">🇳🇱 Netherlands (+31)</option>
                            <option value="+32">🇧🇪 Belgium (+32)</option>
                            <option value="+351">🇵🇹 Portugal (+351)</option>
                            <option value="+30">🇬🇷 Greece (+30)</option>
                            <option value="+45">🇩🇰 Denmark (+45)</option>
                            <option value="+46">🇸🇪 Sweden (+46)</option>
                            <option value="+47">🇳🇴 Norway (+47)</option>
                            <option value="+48">🇵🇱 Poland (+48)</option>
                            <option value="+420">🇨🇿 Czech Republic (+420)</option>
                            <option value="+421">🇸🇰 Slovakia (+421)</option>
                            <option value="+36">🇭🇺 Hungary (+36)</option>
                            <option value="+40">🇷🇴 Romania (+40)</option>
                            <option value="+353">🇮🇪 Ireland (+353)</option>
                            <option value="+972">🇮🇱 Israel (+972)</option>
                            <option value="+90">🇹🇷 Turkey (+90)</option>
                            <option value="+7">🇷🇺 Russia (+7)</option>
                            <option value="+86">🇨🇳 China (+86)</option>
                            <option value="+81">🇯🇵 Japan (+81)</option>
                            <option value="+82">🇰🇷 South Korea (+82)</option>
                            <option value="+61">🇦🇺 Australia (+61)</option>
                            <option value="+64">🇳🇿 New Zealand (+64)</option>
                            <option value="+91">🇮🇳 India (+91)</option>
                            <option value="+52">🇲🇽 Mexico (+52)</option>
                            <option value="+54">🇦🇷 Argentina (+54)</option>
                            <option value="+55">🇧🇷 Brazil (+55)</option>
                            <option value="+56">🇨🇱 Chile (+56)</option>
                            <option value="+57">🇨🇴 Colombia (+57)</option>
                        </select>
                        <label>Country code*</label>
                    </div>

                    <div class="floating-label">
                        <input type="text" id="telefono" name="telefono" required placeholder=" " />
                        <label>Phone number*</label>
                    </div>
                </div>

                <div class="floating-label">
                    <input type="email" id="email" name="email" placeholder=" " />
                    <label>Email address</label>
                </div>

                <button type="button" class="next-btn">Next</button>
            </div>

            <!-- STEP 2 -->
            <div class="step" id="step-2">
                <h3 class="step-title">Wedding attendance</h3>

                <div class="floating-label">
                    <select id="join" name="join" required>
                        <option value="" disabled selected hidden></option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                    <label>Will you be attending the wedding?</label>
                </div>

                <button type="button" class="back-btn">Back</button>
                <button type="button" class="next-btn">Next</button>
            </div>

            <!-- STEP 3 -->
            <div class="step" id="step-3">
                <h3 class="step-title">Travel information</h3>

                <div class="floating-label">
                    <select id="arrivo" name="arrivo" required>
                        <option value="" disabled selected hidden></option>
                        <option value="19/06">June 19</option>
                        <option value="20/06">June 20</option>
                        <option value="I live in Verona">I live in Verona</option>
                    </select>
                    <label>When will you arrive in Verona?</label>
                </div>

                <div class="floating-label">
                    <select id="shuttle" name="shuttle" required>
                        <option value="" disabled selected hidden></option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                    <label>Will you use the shuttle on the weeding day?</label>
                </div>

                <button type="button" class="back-btn">Back</button>
                <button type="button" class="next-btn">Next</button>
            </div>

            <!-- STEP 4 -->
            <div class="step" id="step-4">
                <h3 class="step-title">Food preferences</h3>

                <div class="floating-label">
                    <select id="allergie" name="allergie" required>
                        <option value="" disabled selected hidden></option>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                    <label>Do you have any food allergies?</label>
                </div>

                <div class="floating-label" id="allergieField" style="display:none;">
                    <textarea id="listaAllergie" name="listaAllergie" placeholder=" "></textarea>
                    <label>If yes, please specify</label>
                </div>

                <div class="floating-label">
                    <select id="dieta" name="dieta" required>
                        <option value="" disabled selected hidden></option>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                    </select>
                    <label>Dietary preferences?</label>
                </div>

                <div class="floating-label" id="dietaField" style="display:none;">
                    <select id="tipoDieta" name="tipoDieta">
                        <option value="" disabled selected hidden></option>
                        <option value="Vegetarian">Vegetarian</option>
                        <option value="Vegan">Vegan</option>
                    </select>
                    <label>If yes, please choose</label>
                </div>

                <button type="button" class="back-btn">Back</button>
                <button type="button" class="next-btn">Next</button>
            </div>

            <!-- STEP 5 -->
            <div class="step" id="step-5">
                <h3 class="step-title">Anything else?</h3>

                <div class="floating-label">
                    <textarea id="messaggio" name="messaggio" maxlength="500" placeholder=" "></textarea>
                    <label>Leave us a message 😊</label>
                </div>

                <p id="char-count">0/500</p>

                <button type="button" class="back-btn">Back</button>
                <button type="submit" class="submit-btn">Send RSVP</button>
            </div>

        </form>

        <!-- Loading overlay -->
        <div id="rsvp-loading" class="rsvp-loading" aria-hidden="true">
            <div class="rsvp-loading__box" role="status" aria-live="polite">
                <div class="rsvp-spinner" aria-hidden="true"></div>
                <p class="rsvp-loading__text" id="loading-title"></p>
                <p class="rsvp-loading__sub" id="loading-sub"></p>
            </div>
        </div>

        <!-- Thank you message -->
        <div id="thankyou-animation"></div>

    </div>

    <!-- reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LfSNhosAAAAAAGFpMX5do3nDtl8ImAYIgpHLV8k"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Loading overlay RSVP */
        .rsvp-loading{
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,.35);
            backdrop-filter: blur(2px);
            z-index: 9999;
        }
        .rsvp-loading.is-active{ display:flex; }
        .rsvp-loading__box{
            background:#fff;
            border-radius:18px;
            padding:18px 20px;
            width:min(92vw, 360px);
            box-shadow:0 16px 40px rgba(0,0,0,.18);
            text-align:center;
        }
        .rsvp-spinner{
            width:28px; height:28px;
            margin:0 auto 10px;
            border-radius:50%;
            border:3px solid rgba(0,0,0,.15);
            border-top-color: rgba(0,0,0,.6);
            animation:rsvpSpin .8s linear infinite;
        }
        @keyframes rsvpSpin{ to{ transform: rotate(360deg);} }
        .rsvp-loading__text{ margin:0; font-weight:600; }
        .rsvp-loading__sub{ margin:6px 0 0; opacity:.75; font-size:.95rem; }

        /* Thank you message */
        #thankyou-animation{
            display:none;
            margin-top:24px;
            padding:22px 20px;
            border-radius:18px;
            background:#fff;
            box-shadow:0 16px 40px rgba(0,0,0,.12);
            text-align:center;
            animation:fadeUp .5s ease forwards;
        }
        #thankyou-animation.is-visible{ display:block; }
        #thankyou-animation h3{ margin:0 0 8px; font-size:1.4rem; }
        #thankyou-animation p{ margin:0; opacity:.85; }
        @keyframes fadeUp{
            from{ opacity:0; transform: translateY(12px); }
            to{ opacity:1; transform: translateY(0); }
        }

        /* Bonus visual: highlight invalid fields */

    </style>

    <!-- I18N bridge from _config.yml -->
    <script>
        const LANG = "{{ lang }}";
        const I18N = {
            loading_title: "{{ t.loading_title | escape }}",
            loading_sub: "{{ t.loading_sub | escape }}",
            thanks_yes_title: "{{ t.thanks_yes_title | escape }}",
            thanks_yes_body: "{{ t.thanks_yes_body | escape }}",
            thanks_no_title: "{{ t.thanks_no_title | escape }}",
            thanks_no_body: "{{ t.thanks_no_body | escape }}",
            submit_sending: "{{ t.submit_sending | default: 'Invio…' | escape }}"
        };
    </script>

    <script>
        /* ======================
           CONFIG
        ====================== */
        const ENDPOINT = "https://script.google.com/macros/s/AKfycbxHpFFk7zTqCb7NdpGAmEfu3vrpskgmXTcLAkWkmWbWI5hKdQurXfq86go5pjp7eqd6/exec";
        const SITE_KEY = "6LfSNhosAAAAAAGFpMX5do3nDtl8ImAYIgpHLV8k";

        /* ======================
           HELPERS
        ====================== */
        function hideThankYouMessage() {
            const box = document.getElementById("thankyou-animation");
            if (!box) return;
            box.classList.remove("is-visible");
            box.innerHTML = "";
        }

        function showThankYouMessage(join, playConfetti){
            const box = document.getElementById("thankyou-animation");
            if (!box) return;

            const isNo = join === "No";
            const title = isNo ? I18N.thanks_no_title : I18N.thanks_yes_title;
            const body  = isNo ? I18N.thanks_no_body  : I18N.thanks_yes_body;

            box.innerHTML = `<h3>${title}</h3><p>${body}</p>`;
            box.classList.add("is-visible");

            if (playConfetti && !isNo) setTimeout(launchConfetti, 200);
            box.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        function validateCurrentStep() {
            const stepEl = document.getElementById("step-" + currentStep);
            if (!stepEl) return true;

            // 👇 attiva la visualizzazione errori
            stepEl.classList.add("show-errors");

            const fields = Array.from(stepEl.querySelectorAll("input, select, textarea"))
                .filter(el => !el.disabled && el.offsetParent !== null);

            for (const el of fields) {
                if (!el.checkValidity()) {
                    el.reportValidity();
                    el.focus();
                    return false;
                }
            }
            return true;
        }


        /* ======================
           MULTISTEP LOGIC
        ====================== */
        let currentStep = 1;
        const steps = document.querySelectorAll(".step");

        function showStep(n) {
            steps.forEach(s => {
                s.classList.remove("active");
                s.classList.remove("show-errors"); // 👈 reset errori
            });

            const next = document.getElementById("step-" + n);
            if (next) {
                next.classList.add("active");
                currentStep = n;
            }

            if (n === 1) hideThankYouMessage();
        }


        document.addEventListener("DOMContentLoaded", () => {
            showStep(1);

            document.getElementById("loading-title").textContent = I18N.loading_title;
            document.getElementById("loading-sub").textContent = I18N.loading_sub;

            // appena l’utente ricomincia a compilare, nascondi il thankyou
            document.getElementById("rsvp-form").addEventListener("input", () => {
                hideThankYouMessage();
            }, { passive: true });
        });

        /* BOTTONI "NEXT" */
        document.querySelectorAll(".next-btn").forEach(btn =>
            btn.addEventListener("click", () => {

                // ✅ valida lo step corrente prima di avanzare
                if (!validateCurrentStep()) return;

                // STEP 2 — Wedding Attendance
                if (currentStep === 2) {
                    const join = document.getElementById("join").value;

                    // If NO → immediate send
                    if (join === "No") {
                        submitRSVP(false); // NO CONFETTI
                        return;
                    }
                }

                showStep(currentStep + 1);
            })
        );

        /* BOTTONI "BACK" */
        document.querySelectorAll(".back-btn").forEach(btn =>
            btn.addEventListener("click", () => showStep(currentStep - 1))
        );

        /* TOGGLE ALLERGIE / DIETA + required condizionale */
        document.getElementById("allergie").addEventListener("change", e => {
            const show = e.target.value === "Yes";
            const field = document.getElementById("allergieField");
            const textarea = document.getElementById("listaAllergie");

            field.style.display = show ? "block" : "none";
            textarea.required = show;
            if (!show) textarea.value = "";
        });

        document.getElementById("dieta").addEventListener("change", e => {
            const show = e.target.value === "Yes";
            const field = document.getElementById("dietaField");
            const select = document.getElementById("tipoDieta");

            field.style.display = show ? "block" : "none";
            select.required = show;
            if (!show) select.value = "";
        });

        /* CONTATORE CARATTERI */
        document.getElementById("messaggio").addEventListener("input", function () {
            document.getElementById("char-count").textContent = this.value.length + "/500";
        });

        /* SUBMIT HANDLER */
        document.getElementById("rsvp-form").addEventListener("submit", function (e) {
            e.preventDefault();

            // ✅ valida anche l’ultimo step prima di inviare
            if (!validateCurrentStep()) return;

            submitRSVP(true); // YES confetti
        });

        /* ======================
           SUBMIT
        ====================== */
        async function submitRSVP(playConfetti = true) {
            const overlay = document.getElementById("rsvp-loading");
            const submitBtn = document.querySelector("#step-5 .submit-btn");
            const nextBtns = document.querySelectorAll(".next-btn");
            const backBtns = document.querySelectorAll(".back-btn");

            if (submitRSVP._busy) return;
            submitRSVP._busy = true;

            overlay?.classList.add("is-active");
            overlay?.setAttribute("aria-hidden", "false");

            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.dataset.originalText = submitBtn.textContent;
                submitBtn.textContent = I18N.submit_sending;
            }
            nextBtns.forEach(b => b.disabled = true);
            backBtns.forEach(b => b.disabled = true);

            try {
                const token = await grecaptcha.execute(SITE_KEY, { action: "submit" });

                const params = new URLSearchParams();
                const fields = [
                    "nome","cognome",
                    "prefix","telefono","email",
                    "join",
                    "arrivo","shuttle",
                    "allergie","listaAllergie",
                    "dieta","tipoDieta",
                    "messaggio"
                ];

                fields.forEach(f => params.append(f, document.getElementById(f)?.value || ""));
                params.append("token", token);

                const res = await fetch(ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: params.toString()
                });

                const json = await res.json();

                if (json.status === "success") {
                    const joinValue = document.getElementById("join")?.value || "";

                    // ✅ mostra messaggio prima di resettare
                    showThankYouMessage(joinValue, playConfetti);

                    showStep(1);
                    document.getElementById("rsvp-form").reset();

                    // ripristina required condizionali e campi nascosti
                    document.getElementById("allergieField").style.display = "none";
                    document.getElementById("listaAllergie").required = false;
                    document.getElementById("dietaField").style.display = "none";
                    document.getElementById("tipoDieta").required = false;

                } else {
                    alert("Errore: " + JSON.stringify(json));
                }

            } catch (err) {
                console.error(err);
                alert("Errore di connessione.");
            } finally {
                overlay?.classList.remove("is-active");
                overlay?.setAttribute("aria-hidden", "true");

                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = submitBtn.dataset.originalText || "Invia RSVP";
                }
                nextBtns.forEach(b => b.disabled = false);
                backBtns.forEach(b => b.disabled = false);

                submitRSVP._busy = false;
            }
        }

        /* ======================
           CONFETTI
        ====================== */
        function launchConfetti() {
            var duration = 1500;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 24, spread: 210 });
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
        }
    </script>

</section>
